<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parolni yangilash | BDS SHIFO</title>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">

    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Manrope', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            border: none;
        }
        .auth-header {
            background: #ffc107; /* Warning yellow */
            padding: 30px;
            text-align: center;
            color: #1a2a3a;
        }
        .auth-header i {
            font-size: 40px;
            margin-bottom: 10px;
            display: block;
        }
        .auth-header h4 {
            font-weight: 700;
            margin: 0;
        }
        .card-body {
            padding: 40px;
        }
        .form-group label {
            font-weight: 600;
            color: #495057;
            font-size: 14px;
            margin-bottom: 8px;
        }
        /* Django inputlarini chiroyli qilish */
        input[type="password"], input[type="text"], .form-control {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid #dee2e6;
            transition: 0.3s;
            outline: none;
        }
        input:focus {
            border-color: #ffc107;
            box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.2);
        }
        .helptext, .form-text {
            display: block;
            font-size: 11px;
            color: #6c757d;
            margin-top: 5px;
            line-height: 1.4;
        }
        .errorlist {
            list-style: none;
            padding: 0;
            margin: 5px 0;
            color: #dc3545;
            font-size: 12px;
            font-weight: 600;
        }
        .btn-save {
            background: #28a745;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            width: 100%;
            margin-top: 20px;
            transition: 0.3s;
            cursor: pointer;
        }
        .btn-save:hover {
            background: #218838;
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }
        .btn-cancel {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #6c757d;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .btn-cancel:hover {
            color: #1a2a3a;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="auth-header">
        <i class="fas fa-user-lock"></i>
        <h4>Parolni yangilash</h4>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}

            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}

                    {% if field.help_text %}
                        <span class="helptext">{{ field.help_text|safe }}</span>
                    {% endif %}

                    {% if field.errors %}
                        <div class="errorlist">
                            {{ field.errors }}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="btn-save">
                <i class="fas fa-check-circle mr-2"></i> O'zgarishlarni saqlash
            </button>

            <a href="{% url 'profile_view' %}" class="btn-cancel">
                Bekor qilish va qaytish
            </a>
        </form>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
