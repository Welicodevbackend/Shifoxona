<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shifokor Kirishi | BDS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-box {
            width: 100%;
            max-width: 420px;
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .doctor-icon {
            width: 80px;
            height: 80px;
            background: #e0f2fe;
            color: #0ea5e9;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 auto 20px;
            font-size: 35px;
        }
        .btn-doctor {
            background: #1e293b;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-doctor:hover {
            background: #0f172a;
            transform: translateY(-2px);
            color: #38bdf8;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #e2e8f0;
        }
        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
            border-color: #38bdf8;
        }
    </style>
</head>
<body>

<div class="login-box">
    <div class="text-center mb-4">
        <div class="doctor-icon">
            <i class="fas fa-user-md"></i>
        </div>
        <h4 class="fw-bold">BDS DOCTOR</h4>
        <p class="text-muted small">Shifokorlar uchun nazorat paneliga kirish</p>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger py-2 small border-0 shadow-sm">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="post" action="{% url 'doctor_dashboard_login' %}">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label small fw-bold">Foydalanuvchi nomi</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
                <input type="text" name="username" class="form-control border-start-0" placeholder="Login" required>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label small fw-bold">Parol</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                <input type="password" name="password" class="form-control border-start-0" placeholder="••••••••" required>
            </div>
        </div>
        <button type="submit" class="btn btn-doctor w-100 mb-3">
            Tizimga kirish <i class="fas fa-arrow-right ms-2"></i>
        </button>
        <div class="text-center">
            <a href="{% url 'home' %}" class="text-decoration-none small text-muted"><i class="fas fa-chevron-left me-1"></i> Saytga qaytish</a>
        </div>
    </form>
</div>

</body>
</html>
