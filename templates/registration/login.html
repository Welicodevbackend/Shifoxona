{% load i18n static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tizimga kirish | Bobur Doktor Shifo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8fafc !important; /* Xuddi 2-rasmdagi toza och fon */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .login-card {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            border: none;
            border-radius: 6px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); /* Juda mayin soya */
            background: white;
        }
        .brand-logo {
            color: #1e3a8a;
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .brand-logo span {
            color: #2563eb;
        }
        .login-title {
            font-size: 24px;
            font-weight: 500;
            color: #1e3a8a;
            text-align: center;
            margin-bottom: 6px;
        }
        .login-subtitle {
            font-size: 14px;
            color: #6b7280;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group label {
            font-weight: 500;
            color: #374151;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .form-control {
            border-radius: 6px;
            border: 1px solid #e5e7eb;
            padding: 10px 14px;
            height: auto;
            font-size: 15px;
            background-color: #ffffff;
            color: #1f2937;
            transition: all 0.2s;
        }
        .form-control:focus {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1) !important;
            outline: none;
        }
        .btn-login {
            background-color: #2563eb; /* 2-rasmdagi ko'k rang */
            border: none;
            border-radius: 6px;
            padding: 12px;
            font-weight: 600;
            font-size: 15px;
            color: white;
            transition: background-color 0.2s;
            cursor: pointer;
        }
        .btn-login:hover {
            background-color: #1d4ed8;
            color: white;
        }
        .remember-text {
            font-size: 14px;
            color: #4b5563;
            user-select: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div>
    <!-- Tizim nomi (Logotip o'rnida) -->
    <div class="brand-logo">
        <span>⚡</span> My Clinic
    </div>

    <!-- Login Oynasi -->
    <div class="login-card">
        <div class="login-title">Tizimga kirish</div>
        <div class="login-subtitle">Kirish uchun Login hamda Parolingizni kiriting!</div>

        <form action="{{ app_path }}" method="post">
            {% csrf_token %}

            {% if form.errors %}
                <div class="alert alert-danger p-2 mb-3" style="font-size: 14px; border-radius: 6px;">
                    Login yoki parol xato kiritildi!
                </div>
            {% endif %}

            <!-- Login Input -->
            <div class="form-group">
                <label for="id_username">Login</label>
                <input type="text" name="username" autofocus required id="id_username" class="form-control">
            </div>

            <!-- Parol Input -->
            <div class="form-group" style="margin-bottom: 20px;">
                <label for="id_password">Parol</label>
                <input type="password" name="password" required id="id_password" class="form-control">
            </div>

            <!-- Meni eslab qolish Checkbox -->
<!--            <div class="form-group mb-4">-->
<!--                <div class="d-flex align-items-center" style="gap: 8px;">-->
<!--                    <input type="checkbox" name="remember_me" id="remember_me" checked style="width: 16px; height: 16px; cursor: pointer; accent-color: #2563eb;">-->
<!--                    <label class="remember-text mb-0" for="remember_me">Meni eslab qolish...</label>-->
<!--                </div>-->
<!--            </div>-->

            <!-- Kirish Tugmasi -->
            <button type="submit" class="btn btn-primary btn-block btn-login">
                Kirish
            </button>
        </form>
    </div>
</div>

</body>
</html>
