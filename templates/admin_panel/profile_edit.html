{% extends 'admin_panel/base.html' %}

{% block title %}Profilni tahrirlash{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0 rounded-3">
                <div class="card-header bg-white py-3 border-bottom">
                    <h5 class="mb-0 fw-bold text-primary"><i class="fas fa-user-edit me-2"></i> Profil ma'lumotlarini tahrirlash</h5>
                </div>
                <div class="card-body p-4">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="row mb-4 align-items-center">
                            <div class="col-md-4 text-center">
                              <div class="position-relative d-inline-block">
    {% if profile.photo %}
        <img src="{{ profile.photo.url }}" id="imagePreview" class="rounded-circle shadow" style="width: 150px; height: 150px; object-fit: cover; border: 4px solid #f8f9fa;">
    {% else %}
        <img src="https://via.placeholder.com/150" id="imagePreview" class="rounded-circle shadow" style="width: 150px; height: 150px; object-fit: cover; border: 4px solid #f8f9fa;">
    {% endif %}

    <label for="imageInput" class="btn btn-sm btn-primary position-absolute bottom-0 end-0 rounded-circle" title="Rasmni o'zgartirish">
        <i class="fas fa-camera"></i>
    </label>
    <input type="file" name="image" id="imageInput" class="d-none" accept="image/*" onchange="previewImage(this)">
</div>
                                <p class="small text-muted mt-2">Profil rasmi</p>
                            </div>
                            
                            <div class="col-md-8">
                                <div class="mb-3">
                                    <label class="form-label fw-bold small text-muted">TO'LIQ ISM-SHARIF</label>
                                    <input type="text" name="full_name" class="form-control form-control-lg" value="{{ profile.full_name }}" required>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-bold small text-muted">FOYDALANUVCHI NOMI (LOGIN)</label>
                                    <input type="text" class="form-control bg-light" value="{{ request.user.username }}" readonly>
                                    <small class="text-muted italic">Loginni o'zgartirish uchun adminga murojaat qiling.</small>
                                </div>
                            </div>
                        </div>

                        <hr class="my-4">

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'reception_dash' %}" class="btn btn-light px-4">
                                <i class="fas fa-arrow-left me-2"></i> Orqaga
                            </a>
                            <button type="submit" class="btn btn-success px-5">
                                <i class="fas fa-save me-2"></i> O'zgarishlarni saqlash
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Rasmni tanlaganda darrov ekranda ko'rsatish
    function previewImage(input) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('imagePreview').src = e.target.result;
            }
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
{% endblock %}
