{% for rec in records %}
<tr>
    <td>#{{ rec.id }}</td>
    <td><strong>{{ rec.patient.full_name }}</strong></td>
    <td>{{ rec.doctor.full_name }}</td>
    <td>{{ rec.diagnosis|truncatechars:30 }}</td>
    <td class="text-end">
        <button onclick="viewRecord({{ rec.id }})" class="btn btn-sm btn-outline-info"><i class="fas fa-eye"></i></button>
        <a href="{% url 'export_medical_record_pdf' rec.id %}" class="btn btn-sm btn-outline-danger"><i class="fas fa-file-pdf"></i></a>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="5" class="text-center py-4 text-muted">Ma'lumot topilmadi</td>
</tr>
{% endfor %}
