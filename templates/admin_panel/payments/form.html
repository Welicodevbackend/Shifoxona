{% extends 'admin_panel/base.html' %}

{% block content %}

<!-- Select2 CSS -->
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<!-- Select2 Bootstrap 5 Theme (dizayn chiroyli chiqishi uchun) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />

<style>
    /* Select2 inputini Bootstrap dizayniga moslash */
    .select2-container--bootstrap-5 .select2-selection {
        border: 1px solid #dee2e6;
        height: calc(3.5rem + 2px); /* yoki o'zingizga qulay balandlik */
        padding: 0.375rem 0.75rem;
    }
</style>
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm p-4">
                <h4 class="fw-bold mb-4">
                    {% if payment %}
                        <i class="fas fa-edit text-primary me-2"></i> To'lovni tahrirlash
                    {% else %}
                        <i class="fas fa-plus-circle text-success me-2"></i> Yangi to'lov yaratish
                    {% endif %}
                </h4>

                <form method="post">
                    {% csrf_token %}

                    {% if not payment %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Navbat turi</label>
                        <select name="type_selector" id="type_selector" class="form-select" onchange="toggleFields()">
                            <option value="offline">Klinika (Offline) Navbati</option>
                            <option value="online">Online Navbat</option>
                        </select>
                    </div>

                   <div id="offline_box" class="mb-3">
    <label class="form-label fw-bold">Klinika Navbatini tanlang</label>
    <select name="appointment" class="form-select searchable-select">
        <option value="">-- Navbatni tanlang --</option>
        {% for app in appointments %}
            <option value="{{ app.id }}">
                {{ app.patient_name }} - {{ app.service.name|default:"Ko'rik" }} ({{ app.date }})
            </option>
        {% endfor %}
    </select>
</div>

<div id="online_box" class="mb-3" style="display: none;">
    <label class="form-label fw-bold">Online Navbatni tanlang</label>
    <select name="online_appointment" class="form-select searchable-select">
        <option value="">-- Online bemorni tanlang --</option>
        {% for on in online_appointments %}
            <option value="{{ on.id }}">{{ on.patient_name }} ({{ on.date }})</option>
        {% endfor %}
    </select>
</div>
                    {% endif %}

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">To'lov turi</label>
                            <select name="payment_type" class="form-select">
                                <option value="cash" {% if payment.payment_type == 'cash' %}selected{% endif %}>Naqd</option>
                                <option value="card" {% if payment.payment_type == 'card' %}selected{% endif %}>Karta</option>
                                <option value="online" {% if payment.payment_type == 'online' %}selected{% endif %}>Online</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Holati</label>
                            <div class="form-check form-switch mt-2">
                                <input class="form-check-input" type="checkbox" name="is_paid" id="is_paid"
                                       {% if payment.is_paid %}checked{% endif %} style="width: 50px; height: 25px;">
                                <label class="form-check-label ms-2" for="is_paid">To'langan</label>
                            </div>
                        </div>
                    </div>

                    <hr>
                    <div class="d-flex justify-content-end gap-2">
                        <a href="{% url 'dashboard_payments_list' %}" class="btn btn-light border">Bekor qilish</a>
                        <button type="submit" class="btn btn-success px-4">Ma'lumotlarni saqlash</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<!-- jQuery (Select2 ishlashi uchun kerak) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<!-- Select2 JS -->
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>
$(document).ready(function() {
    function initAjaxSelect(selector, type) {
        $(selector).select2({
            theme: 'bootstrap-5',
            width: '100%',
            placeholder: '-- Bemor ismini yozing --',
            allowClear: true,
            minimumInputLength: 1, // Kamida 1 ta harf yozilsa qidiruv lupasi va oynasi chiqadi
            language: {
                inputTooShort: function() {
                    return "Qidirish uchun kamida 1 ta harf kiriting";
                },
                searching: function() {
                    return "Qidirilmoqda...";
                },
                noResults: function() {
                    return "Bemor topilmadi";
                }
            },
            ajax: {
                url: window.location.href, // So'rov hozirgi payment_create view-ga ketadi
                dataType: 'json',
                delay: 300,
                data: function (params) {
                    return {
                        q: params.term, // Qidiruv matni
                        type: type      // 'offline' yoki 'online'
                    };
                },
                processResults: function (data) {
                    return {
                        results: data.results
                    };
                },
                cache: true
            }
        });
    }

    // Select2 ni ishga tushirish
    initAjaxSelect('select[name="appointment"]', 'offline');
    initAjaxSelect('select[name="online_appointment"]', 'online');
});

// Bloklarni almashtirish
function toggleFields() {
    let type = document.getElementById('type_selector').value;
    $('#offline_box').toggle(type === 'offline');
    $('#online_box').toggle(type === 'online');
}
</script>
<script>
function toggleFields() {
    let type = document.getElementById('type_selector').value;
    document.getElementById('offline_box').style.display = (type === 'offline') ? 'block' : 'none';
    document.getElementById('online_box').style.display = (type === 'online') ? 'block' : 'none';
}

// list.html ichidagi <script> qismiga qo'shing
let debounceTimer;

$('input[name="q"]').on('input', function() {
    clearTimeout(debounceTimer);
    let query = $(this).val();
    let status = $('select[name="status"]').val();

    // 300ms kutib, keyin so'rov yuboradi (serverni qiynamaslik uchun)
    debounceTimer = setTimeout(function() {
        $.ajax({
            url: "{% url 'dashboard_payments_list' %}",
            data: {
                'q': query,
                'status': status
            },
            success: function(data) {
                // Faqat jadval qismini yangilaymiz
                // Buning uchun jadvalni <div id="payment-table-container"> ichiga oling
                $('#payment-table-container').html($(data).find('#payment-table-container').html());
            }
        });
    }, 300);
});
</script>
{% endblock %}
