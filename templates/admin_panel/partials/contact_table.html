{% for msg in contact_messages %}
<tr class="{% if not msg.is_read %}is-unread{% endif %}" onclick="openMessage({{ msg.id }})">
    <td class="ps-4">
        {% if not msg.is_read %}
            <span class="badge-new">Yangi</span>
        {% else %}
            <span class="badge-read">O'qildi</span>
        {% endif %}
    </td>
    <td>
        <div class="fw-bold text-dark">{{ msg.name }}</div>
        <div class="small text-muted fw-normal">{{ msg.email }}</div>
    </td>
    <td>
        <span class="text-dark">{{ msg.subject|truncatechars:40 }}</span>
    </td>
    <td class="text-muted small">
        <i class="far fa-clock me-1"></i> {{ msg.created_at|date:"d.m.Y, H:i" }}
    </td>
    <td class="text-end pe-4" onclick="event.stopPropagation();">
        <div class="btn-group shadow-sm rounded-pill overflow-hidden bg-white">
            <button class="btn btn-sm btn-white px-3" onclick="openMessage({{ msg.id }})" title="Ko'rish">
                <i class="fas fa-eye text-primary"></i>
            </button>
            <button class="btn btn-sm btn-white px-3 border-start" onclick="confirmDeleteMessage({{ msg.id }})" title="O'chirish">
                <i class="fas fa-trash text-danger"></i>
            </button>
        </div>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="5" class="text-center py-5">
        <div class="py-4">
            <i class="fas fa-inbox fa-3x text-light mb-3"></i>
            <p class="text-muted">Hech qanday xabar topilmadi.</p>
        </div>
    </td>
</tr>
{% endfor %}
