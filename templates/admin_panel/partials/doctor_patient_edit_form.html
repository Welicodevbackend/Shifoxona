<div class="modal-header bg-warning text-white">
    <h5 class="modal-title fw-bold">Bemor ma'lumotlarini tahrirlash</h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>
<form action="{% url 'doctor_patient_edit_dashboard' patient.id %}" method="POST">
    {% csrf_token %}
    <div class="modal-body p-4">
        <p class="text-muted small mb-3">Bemor: <strong>{{ patient.full_name }}</strong></p>
        {{ form.as_p }}
    </div>
    <div class="modal-footer border-0">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Bekor qilish</button>
        <button type="submit" class="btn btn-warning px-4 fw-bold">O'zgarishlarni saqlash</button>
    </div>
</form>
