{% for service in services %}
<tr>
    <td class="ps-4">
        <a href="{% url 'service_detail_dashboard' service.id %}" class="text-decoration-none fw-bold text-primary">
            {{ service.id }}
        </a>
    </td>
    <td>
        <a href="{% url 'service_detail_dashboard' service.id %}">
            {% if service.image %}
                <img src="{{ service.image.url }}" class="dept-img shadow-sm" alt="{{ service.name }}" style="width: 45px; height: 45px; border-radius: 8px; object-fit: cover;">
            {% else %}
                <div class="bg-light d-flex align-items-center justify-content-center text-muted" style="width: 45px; height: 45px; border-radius: 8px;">
                    <i class="fas fa-concierge-bell"></i>
                </div>
            {% endif %}
        </a>
    </td>
    <td>
        <a href="{% url 'service_detail_dashboard' service.id %}" class="text-decoration-none fw-bold text-dark">
            {{ service.name }}
        </a>
    </td>
    <td>
        <span class="badge bg-light text-secondary border px-2 py-1">{{ service.department.name }}</span>
    </td>
    <td>
        <span class="fw-bold text-success">{{ service.price }} so'm</span>
    </td>
    <td class="text-end pe-4">
        <a href="{% url 'service_detail_dashboard' service.id %}" class="action-view" style="color: #3b82f6; background: #eff6ff; padding: 8px; border-radius: 8px; display: inline-block;">
            <i class="fas fa-eye"></i>
        </a>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="6" class="text-center py-5 text-muted">Xizmatlar topilmadi.</td>
</tr>
{% endfor %}
