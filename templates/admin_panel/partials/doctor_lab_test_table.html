{% for test in lab_tests %}
<tr>
    <td class="ps-4">
        <a href="{% url 'doctor_lab_test_detail_dashboard' test.id %}" class="text-decoration-none fw-bold text-primary">
            {{ test.id }}
        </a>
    </td>
    <td>
        <a href="{% url 'doctor_lab_test_detail_dashboard' test.id %}" class="text-decoration-none fw-bold text-dark">
            {{ test.name }}
        </a>
    </td>
    <td>
        <span class="fw-bold text-success">{{ test.price }} so'm</span>
    </td>
    <td>
        <span class="text-muted small">
            <i class="far fa-calendar-alt me-1"></i> {{ test.created_at|date:"d.m.Y" }}
        </span>
    </td>
    <td class="text-end pe-4">
        <a href="{% url 'doctor_lab_test_detail_dashboard' test.id %}" class="action-view"
           style="color: #3b82f6; background: #eff6ff; padding: 8px; border-radius: 8px; display: inline-block;">
            <i class="fas fa-eye"></i>
        </a>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="5" class="text-center py-5 text-muted">Tahlillar topilmadi.</td>
</tr>
{% endfor %}
