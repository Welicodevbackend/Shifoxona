<div class="modal-header border-0 pb-0 pt-4 px-4">
    <h5 class="fw-bold text-dark mb-0">
        <i class="fas fa-envelope-open text-primary me-2"></i> Xabar tafsiloti
    </h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body p-4">
    <div class="row mb-3">
        <div class="col-sm-6">
            <label class="small text-muted d-block uppercase mb-1">Kimdan</label>
            <div class="fw-bold text-dark">{{ msg.name }}</div>
            <div class="text-primary small">{{ msg.email }}</div>
        </div>
        <div class="col-sm-6 text-sm-end">
            <label class="small text-muted d-block mb-1">Sana</label>
            <div class="small fw-bold">{{ msg.created_at|date:"d-F, Y | H:i" }}</div>
        </div>
    </div>

    <div class="mb-3">
        <label class="small text-muted d-block mb-1">Mavzu</label>
        <div class="p-2 px-3 bg-light rounded-3 fw-bold text-dark border-start border-3 border-primary">
            {{ msg.subject }}
        </div>
    </div>

    <div class="mb-0">
        <label class="small text-muted d-block mb-1">Xabar matni</label>
        <div class="p-3 bg-light rounded-4" style="min-height: 120px; white-space: pre-wrap; font-size: 15px; color: #444; border: 1px solid #eee;">
            {{ msg.message }}
        </div>
    </div>
</div>

<div class="modal-footer border-0 p-4 pt-0">
    <button type="button" class="btn btn-light px-4 rounded-pill fw-bold" data-bs-dismiss="modal">Yopish</button>

    {% if not msg.is_read %}
        <button type="button" class="btn btn-primary px-4 rounded-pill fw-bold shadow" onclick="markRead({{ msg.id }})">
            <i class="fas fa-check-double me-2"></i> O'qildi deb belgilash
        </button>
    {% endif %}
</div>
