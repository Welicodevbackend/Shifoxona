{% extends 'admin_panel/base.html' %}

{% block title %}Yangi parol o'rnatish{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-primary text-white text-center py-4 rounded-top-4">
                    <i class="fas fa-key fa-3x mb-3"></i>
                    <h4 class="mb-0 fw-bold">Yangi parol o'rnatish</h4>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted text-center mb-4 small">
                        Xavfsizlik uchun kamida 8 ta belgi, bosh harf, raqam va belgi ishlating.
                    </p>

                    <form method="POST" id="passwordForm">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-secondary">YANGI PAROL</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                                <input type="password" id="new_pass" name="new_password" class="form-control border-start-0 ps-0" placeholder="********" required>
                            </div>
                            
                            <div class="progress mt-3" style="height: 6px;">
                                <div id="strength_bar" class="progress-bar" role="progressbar" style="width: 0%"></div>
                            </div>
                            <div class="d-flex justify-content-between mt-1">
                                <small id="strength_text" class="text-muted small">Parol kiritilmagan</small>
                                <small id="strength_percent" class="text-muted small">0%</small>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small text-secondary">PAROLNI TAKRORLANG</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fas fa-check-double text-muted"></i></span>
                                <input type="password" id="confirm_pass" class="form-control border-start-0 ps-0" placeholder="********" required>
                            </div>
                            <small id="match_error" class="text-danger d-none mt-1">
                                <i class="fas fa-times-circle me-1"></i> Parollar mos kelmadi!
                            </small>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" id="save_btn" class="btn btn-primary py-2 fw-bold shadow-sm" disabled>
                                <i class="fas fa-save me-2"></i> Saqlash va Dashboardga qaytish
                            </button>
                            <a href="{% url 'reception_dash' %}" class="btn btn-link btn-sm text-decoration-none text-muted mt-2">
                                Bekor qilish
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const newPass = document.getElementById('new_pass');
    const confirmPass = document.getElementById('confirm_pass');
    const strengthBar = document.getElementById('strength_bar');
    const strengthText = document.getElementById('strength_text');
    const strengthPercent = document.getElementById('strength_percent');
    const saveBtn = document.getElementById('save_btn');
    const matchError = document.getElementById('match_error');

    function updateValidation() {
        let val = newPass.value;
        let strength = 0;

        if (val.length >= 8) strength += 25;
        if (/[A-Z]/.test(val)) strength += 25;
        if (/[0-9]/.test(val)) strength += 25;
        if (/[^A-Za-z0-9]/.test(val)) strength += 25;

        strengthBar.style.width = strength + "%";
        strengthPercent.innerText = strength + "%";

        if (strength <= 25) { 
            strengthBar.className = "progress-bar bg-danger"; 
            strengthText.innerText = "Juda kuchsiz"; 
            strengthText.className = "text-danger small";
        } else if (strength <= 50) { 
            strengthBar.className = "progress-bar bg-warning"; 
            strengthText.innerText = "O'rtacha"; 
            strengthText.className = "text-warning small";
        } else if (strength <= 75) { 
            strengthBar.className = "progress-bar bg-info"; 
            strengthText.innerText = "Kuchli"; 
            strengthText.className = "text-info small";
        } else { 
            strengthBar.className = "progress-bar bg-success"; 
            strengthText.innerText = "Mukammal"; 
            strengthText.className = "text-success small";
        }

        // Tasdiqlash mantig'i
        const isMatch = (newPass.value === confirmPass.value && confirmPass.value !== "");
        
        if (confirmPass.value !== "") {
            if (isMatch) {
                matchError.classList.add('d-none');
                confirmPass.classList.add('is-valid');
                confirmPass.classList.remove('is-invalid');
            } else {
                matchError.classList.remove('d-none');
                confirmPass.classList.add('is-invalid');
                confirmPass.classList.remove('is-valid');
            }
        }

        // Faqat 100% va mos bo'lsa tugma yonadi
        saveBtn.disabled = !(strength === 100 && isMatch);
    }

    newPass.addEventListener('input', updateValidation);
    confirmPass.addEventListener('input', updateValidation);
</script>
{% endblock %}
