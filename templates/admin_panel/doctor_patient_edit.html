{% extends 'admin_panel/base_doctor.html' %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-header bg-white py-3">
                    <h5 class="fw-bold m-0"><i class="fas fa-edit me-2 text-warning"></i> Bemor ma'lumotlarini tahrirlash</h5>
                </div>
                <form method="POST">
                    {% csrf_token %}
                    <div class="card-body p-4">
                        <p class="text-muted small mb-4">Diqqat! <span class="fw-bold text-dark">{{ patient.full_name }}</span> ma'lumotlarini o'zgartiryapsiz.</p>
                        {{ form.as_p }}
                    </div>
                    <div class="card-footer bg-white border-0 d-flex justify-content-between p-4">
                        <a href="{% url 'doctor_patients_list_dashboard' %}" class="btn btn-light px-4">Bekor qilish</a>
                        <button type="submit" class="btn btn-warning px-4 fw-bold">O'zgarishlarni saqlash</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
